name: Hotfix Branch CI/CD

on:
  push:
    branches:
      - 'hotfix/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build, test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository including submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build, test and run Spotless
        run: mvn -B -ntp clean verify spotless:check

  deploy-production-candidate:
    name: Deploy hotfix package
    needs: build-test-lint
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository including submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 25 and GitHub Packages
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy to GitHub Packages
        run: mvn -B -ntp deploy -DskipTests -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
