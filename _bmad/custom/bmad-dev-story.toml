# Git Flow Enforcement for bmad-dev-story
# - Blocks development on develop branch.
# - Requires feature branch to exist locally.

[workflow]
activation_steps_prepend = [
  { type = "bash", command = "git checkout feature/{{story_key}} || { echo '❌ Feature branch not found. Run bmad-create-story first.'; exit 1; }", description = "Enforce feature branch" }
]