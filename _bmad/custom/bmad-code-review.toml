# Maven Versioning Automation for bmad-code-review
# Auto-bumps versions, tags releases, and syncs develop branch.

[workflow]
activation_steps_prepend = [
  { type = "bash", command = "mvn --version && mvn versions:help | grep -q 'versions-maven-plugin' || { echo '❌ Versions Maven Plugin not found'; exit 1; }", description = "Check Maven setup" }
]

# Post-feature actions (patch version bump: 1.0.0 -> 1.0.1-SNAPSHOT)
on_approve_story = [
  { type = "bash", command = "git flow feature finish -s {{story_key}}", description = "Merge feature branch" },
  { type = "bash", command = "source _bmad/custom/scripts/maven_helpers.sh && next_version=$(calculate_next_patch_version $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)) && mvn versions:set -DnewVersion=$next_version -DgenerateBackupPoms=false", description = "Bump to next patch version" },
  { type = "bash", command = "git add pom.xml && git commit -m '🔖 Bump version to $(source _bmad/custom/scripts/maven_helpers.sh && calculate_next_patch_version $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout))'", description = "Commit version bump" },
  { type = "bash", command = "git checkout develop && git merge --ff-only $(git rev-parse --abbrev-ref HEAD)", description = "Sync develop with new version" }
]

# Post-release actions (minor version bump: 1.0.0 -> 1.1.0-SNAPSHOT)
on_approve_release = [
  { type = "bash", command = "git flow release finish -m 'Release {{version}}' {{version}}", description = "Finish release" },
  { type = "bash", command = "source _bmad/custom/scripts/maven_helpers.sh && next_version=$(calculate_next_minor_version {{version}}) && mvn versions:set -DnewVersion=$next_version -DgenerateBackupPoms=false", description = "Bump to next minor version" },
  { type = "bash", command = "git add pom.xml && git commit -m '🔖 Bump version to $(source _bmad/custom/scripts/maven_helpers.sh && calculate_next_minor_version {{version}})'", description = "Commit version bump" },
  { type = "bash", command = "git tag -a v{{version}} -m 'Release {{version}}'", description = "Tag release" },
  { type = "bash", command = "git push origin v{{version}}", description = "Push tag to remote" },
  { type = "bash", command = "git checkout develop && git merge --ff-only $(git rev-parse --abbrev-ref HEAD)", description = "Sync develop with new version" }
]

# Post-hotfix actions (patch version bump: 1.0.0 -> 1.0.1-SNAPSHOT)
on_approve_hotfix = [
  { type = "bash", command = "git flow hotfix finish -m 'Hotfix {{hotfix_name}}' {{hotfix_name}}", description = "Finish hotfix" },
  { type = "bash", command = "source _bmad/custom/scripts/maven_helpers.sh && next_version=$(calculate_next_patch_version $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)) && mvn versions:set -DnewVersion=$next_version -DgenerateBackupPoms=false", description = "Bump to next patch version" },
  { type = "bash", command = "git add pom.xml && git commit -m '🔖 Bump version to $(source _bmad/custom/scripts/maven_helpers.sh && calculate_next_patch_version $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout))'", description = "Commit version bump" },
  { type = "bash", command = "git tag -a v$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout) -m 'Hotfix $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)'", description = "Tag hotfix" },
  { type = "bash", command = "git push origin v$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)", description = "Push tag to remote" },
  { type = "bash", command = "git checkout develop && git merge --ff-only $(git rev-parse --abbrev-ref HEAD)", description = "Sync develop with new version" }
]